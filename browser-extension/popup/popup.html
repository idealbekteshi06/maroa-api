<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Maroa</title>
    <style>
      :root {
        color-scheme: light dark;
        --ink-50: #fafafa;
        --ink-700: #1d1d1f;
        --ink-300: #d2d2d7;
        --accent-500: #5145e5;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        width: 320px;
        background: #ffffff;
        color: var(--ink-700);
      }
      h1 { font-size: 14px; margin: 0 0 12px; letter-spacing: -0.01em; }
      label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #6e6e73; margin-bottom: 4px; }
      input { width: 100%; padding: 9px 11px; border: 1px solid var(--ink-300); border-radius: 10px; font-size: 13px; box-sizing: border-box; margin-bottom: 12px; }
      input:focus { outline: 2px solid var(--accent-500); outline-offset: -1px; }
      button { width: 100%; padding: 10px; border: 0; border-radius: 999px; background: var(--ink-700); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
      button:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
      .status { font-size: 12px; margin-top: 8px; color: #6e6e73; }
      .status.ok { color: #2e7d32; }
      .status.err { color: #c62828; }
      footer { font-size: 11px; color: #6e6e73; margin-top: 16px; text-align: center; }
      footer a { color: var(--accent-500); text-decoration: none; }
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0b; color: #f5f5f7; }
        input { background: #1d1d1f; border-color: #424245; color: #f5f5f7; }
        button { background: #f5f5f7; color: #1d1d1f; }
        h1 { color: #f5f5f7; }
      }
    </style>
  </head>
  <body>
    <h1>Maroa — Save inspiration</h1>
    <form id="cfg">
      <label for="api">API URL</label>
      <input id="api" type="url" placeholder="https://maroa-api-production.up.railway.app" />
      <label for="token">Token</label>
      <input id="token" type="password" placeholder="paste from maroa.ai/settings" />
      <button type="submit">Save + test</button>
      <p id="status" class="status"></p>
    </form>
    <footer>
      Right-click any Instagram / Facebook / TikTok post → <em>Save to Maroa</em>. <br />
      <a href="https://docs.maroa.ai/browser-extension" target="_blank" rel="noopener">Docs</a>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
