paths:
  /webhook/paddle-webhook:
    post:
      tags:
        - payments
      summary: "Paddle subscription webhook"
      description: "Handles subscription lifecycle: activated, updated, canceled, paused, resumed, past_due, trialing. Also transaction.completed + transaction.refunded. Verifies Paddle HMAC signature with 5-minute timestamp tolerance, then dedupes via webhook_events(provider='paddle', event_id) before any side-effect."
      responses:
        200:
          description: "Successful response"
        400:
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        402:
          description: "Payment Required — cost cap reached"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        429:
          description: "Rate limited"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      requestBody:
        description: "Request body — hand-edit shape per route"
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /webhook/stripe-webhook:
    post:
      tags:
        - payments
      summary: "Stripe webhook (legacy)"
      description: "Legacy Stripe integration kept for in-flight subscriptions. New customers use Paddle. Verifies Stripe signature + dedupes via webhook_events(provider='stripe', event_id)."
