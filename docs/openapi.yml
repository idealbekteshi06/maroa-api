    post:
      tags:
        - payments
      summary: 'Paddle subscription webhook'
      description: "Handles subscription lifecycle: activated, updated, canceled, paused, resumed, past_due, trialing. Also transaction.completed + transaction.refunded. Verifies Paddle HMAC signature with 5-minute timestamp tolerance, then dedupes via webhook_events(provider='paddle', event_id) before any side-effect."
