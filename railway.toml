# Config-as-code at repo root. Also set in Railway Variables:
#   RAILWAY_HEALTHCHECK_TIMEOUT_SEC=600
#
# Use `node server.js` (not npm start) so prestart/sync_foundation does not run at boot.

[build]
buildCommand = "node scripts/sync_foundation.mjs"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/healthz"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
