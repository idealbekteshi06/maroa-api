# Railway config-as-code (repo root). Dashboard overrides are replaced by this file.
# If deploys still fail at ~5m, set service variable RAILWAY_HEALTHCHECK_TIMEOUT_SEC=600
# in Railway → Variables (see docs/RAILWAY_DEPLOY.md).

[build]
buildCommand = "npm run build"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/healthz"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
