name: CI

# Runs on every push to main + every PR. Blocks merge if anything fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Lint + Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (production-safe)
        run: npm ci

      # ─── 1. Unit + integration tests (fast, must pass) ──────────────────
      - name: Run test suite
        run: npm test
        env:
          NODE_ENV: test

      # ─── 2. Lint (style + bug-prone patterns) ───────────────────────────
      - name: ESLint
        run: npm run lint
        continue-on-error: false

      # ─── 3. Format check (Prettier) ─────────────────────────────────────
      - name: Prettier check
        run: npm run format:check
        continue-on-error: false

      # ─── 4. Security audit (npm audit + dependency vulnerabilities) ─────
      - name: npm audit (high severity blocks merge)
        run: npm audit --audit-level=high
        continue-on-error: false

      # ─── 5. Syntax check on every JS file (catches stupid typos fast) ───
      - name: Syntax check entrypoints
        run: |
          set -e
          node --check server.js
          find services lib middleware scripts -name '*.js' -print0 \
            | xargs -0 -n1 node --check

      # ─── 6. Migration sanity (no gaps, naming, latest referenced) ───────
      - name: Migration sanity check
        run: npm run check-migrations

      # ─── 7. Prompt regression (dry mode — uses stubbed_output) ──────────
      - name: Prompt regression (dry)
        run: npm run eval-prompts

      # ─── 8. OpenAPI generator runs cleanly (catches route file syntax) ──
      - name: Regenerate OpenAPI skeleton
        run: |
          npm run generate-openapi
          if ! git diff --quiet docs/openapi.yml; then
            echo "::warning::docs/openapi.yml out of date — run npm run generate-openapi and commit."
          fi

      # ─── 9. SBOM — CycloneDX bill of materials uploaded as workflow artifact ──
      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --output-format JSON --output-file sbom.json || true
        continue-on-error: true
      - name: Upload SBOM artifact
        if: hashFiles('sbom.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

  frontend:
    name: Frontend — typecheck + lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Audit 2026-05-19 F6: frontend was not gated on CI. A type or build
    # error could land on main and only surface in production deploy.
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + component tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Provide stand-in values so layout.tsx + middleware boot without
          # crashing on missing env. Real values come from Railway/Vercel at
          # deploy time. These are NEVER used at runtime in CI.
          NEXT_PUBLIC_SUPABASE_URL: https://example-ci.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-fake-anon-key
          NEXT_PUBLIC_API_URL: https://maroa-api-production.up.railway.app
          NEXT_PUBLIC_SITE_URL: https://maroa.ai

      - name: Frontend npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [test, frontend, secret-scan]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "::error::CI failed on ${{ github.sha }}. Block deploy."
