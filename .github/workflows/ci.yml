name: CI

# Runs on every push to main + every PR. Blocks merge if anything fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Lint + Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (production-safe)
        run: npm ci

      # ─── 1. Unit + integration tests (fast, must pass) ──────────────────
      - name: Run test suite
        run: npm test
        env:
          NODE_ENV: test

      # ─── 2. Lint (style + bug-prone patterns) ───────────────────────────
      - name: ESLint
        run: npm run lint
        continue-on-error: false

      # ─── 3. Format check (Prettier) ─────────────────────────────────────
      - name: Prettier check
        run: npm run format:check
        continue-on-error: false

      # ─── 4. Security audit (npm audit + dependency vulnerabilities) ─────
      - name: npm audit (high severity blocks merge)
        run: npm audit --audit-level=high
        continue-on-error: false

      # ─── 5. Syntax check on every JS file (catches stupid typos fast) ───
      - name: Syntax check entrypoints
        run: |
          set -e
          node --check server.js
          find services lib middleware scripts -name '*.js' -print0 \
            | xargs -0 -n1 node --check

      # ─── 6. Migration sanity (no gaps, naming, latest referenced) ───────
      - name: Migration sanity check
        run: npm run check-migrations

      # ─── 7. Prompt regression (dry mode — uses stubbed_output) ──────────
      - name: Prompt regression (dry)
        run: npm run eval-prompts

      # ─── 8. OpenAPI generator runs cleanly (catches route file syntax) ──
      - name: Regenerate OpenAPI skeleton
        run: |
          npm run generate-openapi
          if ! git diff --quiet docs/openapi.yml; then
            echo "::warning::docs/openapi.yml out of date — run npm run generate-openapi and commit."
          fi

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [test, secret-scan]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "::error::CI failed on ${{ github.sha }}. Block deploy."
