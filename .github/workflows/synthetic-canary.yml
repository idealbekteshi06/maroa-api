name: Synthetic canary — production

# Public-endpoint probe every 15 minutes. No auth required — avoids false
# failures when MAROA_CANARY_TOKEN is unset.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  canary:
    name: Probe production
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run synthetic canary
        env:
          MAROA_API_URL: ${{ secrets.CANARY_URL || secrets.PRODUCTION_URL || 'https://maroa-api-production.up.railway.app' }}
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
          MAROA_CANARY_LABEL: prod
        run: node scripts/synthetic-canary.js
