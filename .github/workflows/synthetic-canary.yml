name: Synthetic canary — production

# Runs every 15 minutes against production. The same sequence a real
# signed-in user hits on dashboard load. Fires to SLACK_ALERT_WEBHOOK_URL
# on any failure.

on:
  schedule:
    # */15 * * * * — every 15 min UTC
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  canary:
    name: Probe production
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run synthetic canary
        env:
          MAROA_API_URL: https://maroa-api-production.up.railway.app
          MAROA_API_TOKEN: ${{ secrets.MAROA_CANARY_TOKEN }}
          MAROA_CANARY_BUSINESS: ${{ secrets.MAROA_CANARY_BUSINESS }}
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
          MAROA_CANARY_LABEL: prod
        run: node scripts/synthetic-canary.js
