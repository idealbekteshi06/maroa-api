# Dependabot scope: GitHub Actions only.
#
# npm dependencies are handled by Renovate (renovate.json) which is more
# capable: vulnerability alerts, grouped PRs, lockfile maintenance,
# critical-path package gating, weekly schedule.
#
# Audit 2026-05-18 M9 hardening: previously BOTH bots opened PRs for npm,
# causing duplicate work and merge conflicts on the lockfile. Dependabot
# is now scoped to github-actions only — Renovate doesn't track those well.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "automated"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
